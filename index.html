<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oliver Samuels — The Collection · Coming Soon</title>
  <meta name="description" content="The official Oliver Samuels merch collection. Fifty years of laughter, worn well. Launching soon — sign up for first access." />
  <meta name="robots" content="noindex,nofollow" />
  <meta property="og:title" content="Oliver Samuels — The Collection" />
  <meta property="og:description" content="Fifty years of laughter, worn well. Launching soon." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style-v2.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .cs {
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 32px 0 28px;
    }
    .cs-nav { display: flex; justify-content: center; }
    .cs-hero {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 60px 24px;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }
    .cs-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--green);
      margin-bottom: 28px;
    }
    .cs-eyebrow .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px var(--green-soft);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px var(--green-soft); }
      50%      { box-shadow: 0 0 0 8px rgba(30,90,42,0.06); }
    }
    .cs-title {
      font-family: var(--serif); font-weight: 400;
      font-size: clamp(44px, 7vw, 88px);
      line-height: 1; letter-spacing: -0.025em;
      margin-bottom: 22px;
    }
    .cs-title em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
    .cs-sub {
      font-size: 16px; line-height: 1.65;
      color: var(--ink-soft);
      max-width: 480px;
      margin: 0 auto 36px;
    }
    .cs-form {
      display: flex; gap: 0;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
      max-width: 440px; width: 100%;
    }
    .cs-form input {
      flex: 1; min-width: 0;
      border: 0; background: transparent;
      padding: 13px 20px;
      font: inherit; outline: 0; color: var(--ink);
    }
    .cs-form input::placeholder { color: var(--mute); }
    .cs-form button {
      background: var(--ink); color: var(--bg);
      border: 0; border-radius: 999px;
      padding: 13px 26px;
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.02em;
      transition: background .25s ease;
    }
    .cs-form button:hover { background: var(--green); }
    .cs-note {
      font-size: 12px;
      color: var(--mute);
      margin-top: 16px;
      transition: color .25s ease;
    }
    .cs-divider {
      display: inline-flex; align-items: center; gap: 12px;
      margin: 32px auto;
      color: var(--mute);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .cs-divider::before, .cs-divider::after {
      content: ""; display: block;
      width: 40px; height: 1px;
      background: var(--line);
    }
    .cs-foot {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--mute);
    }
    .cs-foot strong {
      display: block;
      font-family: var(--serif);
      font-weight: 500;
      color: var(--ink);
      font-size: 14px;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <main class="cs wrap">
    <header class="cs-nav">
      <a class="nav-logo" href="index.html" style="font-size:20px">
        <span class="mark">OS</span>
        <span>Oliver Samuels</span>
      </a>
    </header>

    <section class="cs-hero">
      <p class="cs-eyebrow"><span class="dot"></span> The Collection · Launching 2026</p>
      <h1 class="cs-title">Fifty years of laughter,<br/><em>worn well.</em></h1>
      <p class="cs-sub">The official Oliver Samuels merch collection — heritage tees, heavyweight hoodies, and signature caps. Made in Jamaica.</p>

      <form class="cs-form" onsubmit="handleSubmit(event)">
        <input type="email" placeholder="your@email.com" required aria-label="Email address" />
        <button type="submit">Notify me</button>
      </form>
      <p class="cs-note" id="signupNote">First access. No noise.</p>

      <span class="cs-divider">Coming soon</span>
    </section>

    <footer class="cs-foot">
      <strong>Oliver Samuels</strong>
      © 2026 · Kingston, Jamaica
    </footer>
  </main>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const note = document.getElementById('signupNote');
      const email = form.querySelector('input').value.trim();
      if (!email || !email.includes('@')) return;
      // TODO: wire to Mailchimp / Klaviyo / Shopify customer signup before launch.
      note.textContent = "Thanks — we'll be in touch at launch.";
      note.style.color = 'var(--green)';
      form.style.opacity = '0.6';
      form.querySelector('input').disabled = true;
      form.querySelector('button').disabled = true;
    }
  </script>
</body>
</html>
